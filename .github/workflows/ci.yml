name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore src/Daxter.Cli/Daxter.Cli.csproj
          dotnet restore src/Daxter.Web/Daxter.Web.csproj
          dotnet restore tests/Daxter.Core.Tests/Daxter.Core.Tests.csproj
      - name: Test
        run: dotnet test tests/Daxter.Core.Tests/Daxter.Core.Tests.csproj -c Release --no-restore
      # v1.40.0 — fail CI on any KNOWN-VULNERABLE transitive/direct dependency. `--include-transitive`
      # catches CVEs in packages we don't reference directly. dotnet prints the exact phrase
      # "has the following vulnerable packages" ONLY when a CVE is matched, so we key off that — a
      # freshly-disclosed CVE in MSAL / SqlClient / the MCP SDK then surfaces on the next push
      # instead of in a pentest. (Clean runs print "has no vulnerable packages".)
      - name: Audit dependencies (fail on known vulnerabilities)
        run: |
          fail=0
          for proj in src/Daxter.Cli/Daxter.Cli.csproj src/Daxter.Web/Daxter.Web.csproj; do
            echo "== $proj =="
            out="$(dotnet list "$proj" package --vulnerable --include-transitive 2>&1)"
            echo "$out"
            if echo "$out" | grep -qi 'has the following vulnerable packages'; then
              echo "::error::Vulnerable dependencies found in $proj"; fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "✓ no known-vulnerable dependencies"
          exit $fail

  image:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (tests run inside; retry transient base-image pulls)
        run: |
          for attempt in 1 2 3; do
            docker build -t daxter:ci . && exit 0
            echo "::warning::build attempt $attempt failed (often a transient mcr.microsoft.com pull); retrying in 15s"
            sleep 15
          done
          exit 1

  publish:
    name: Publish image to GHCR
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3      # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build & push multi-arch (linux/amd64 + linux/arm64; tests already gated by the test + image jobs)
        run: |
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          for attempt in 1 2 3; do
            if docker buildx build \
                 --platform linux/amd64,linux/arm64 \
                 --build-arg "DAXTER_VERSION=${GITHUB_REF_NAME}" \
                 --build-arg RUN_TESTS=0 \
                 -t "$IMG:latest" -t "$IMG:${GITHUB_REF_NAME}" \
                 --push .; then
              exit 0
            fi
            echo "::warning::publish attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
