name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore src/Daxter.Cli/Daxter.Cli.csproj
          dotnet restore tests/Daxter.Core.Tests/Daxter.Core.Tests.csproj
      - name: Test
        run: dotnet test tests/Daxter.Core.Tests/Daxter.Core.Tests.csproj -c Release --no-restore

  image:
    name: Docker build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (tests run inside; retry transient base-image pulls)
        run: |
          for attempt in 1 2 3; do
            docker build -t daxter:ci . && exit 0
            echo "::warning::build attempt $attempt failed (often a transient mcr.microsoft.com pull); retrying in 15s"
            sleep 15
          done
          exit 1

  publish:
    name: Publish image to GHCR
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build & push (lowercase image name; retry transient pulls)
        run: |
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          for attempt in 1 2 3; do
            if docker build -t "$IMG:latest" -t "$IMG:${GITHUB_REF_NAME}" . \
               && docker push "$IMG:latest" \
               && docker push "$IMG:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "::warning::publish attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          exit 1
